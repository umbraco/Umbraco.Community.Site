<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeGarden — Side by Side</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, sans-serif;
    }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid #ddd;
    }
    .pane:last-child { border-right: none; }
    .pane iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="pane">
    <iframe src="/signage/" title="Signage"></iframe>
  </div>
  <div class="pane">
    <iframe src="https://my.walls.io/cg26" title="Social Wall"></iframe>
  </div>
</body>
</html>
