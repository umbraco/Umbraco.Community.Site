name: Build and Upload SBOMs to Dependency-Track

on:
  workflow_dispatch:
  push:
    branches:
      - '*'

env:
  TRACKER_ENDPOINT: "https://ca-live-global-dtrack-api.purplemoss-6e7d841c.westeurope.azurecontainerapps.io/api/v1/bom"

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # .NET SBOM
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Install CycloneDX for .NET
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM for .NET
        run: |
          mkdir -p ./sbom
          SOLUTION_FILE=$(find . -name "*.sln" | head -n 1)
          if [ -z "$SOLUTION_FILE" ]; then
            PROJECT_FILE=$(find . -name "*.csproj" -o -name "*.fsproj" -o -name "*.vbproj" | head -n 1)
            if [ -z "$PROJECT_FILE" ]; then
              echo "No solution or project files found!"
              exit 1
            else
              TARGET_FILE="$PROJECT_FILE"
            fi
          else
            TARGET_FILE="$SOLUTION_FILE"
          fi
          dotnet-CycloneDX "$TARGET_FILE" --output ./sbom --filename bom-dotnet.xml --output-format Xml --spec-version 1.6 --enable-github-licenses --github-bearer-token ${{ secrets.GITHUB_TOKEN }}

      # Node.js SBOM
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install CycloneDX Node.js CLI
        run: npm install -g @cyclonedx/cyclonedx-npm

      # Each frontend tree gets its own SBOM and its own Dependency-Track
      # project, so vulnerabilities can be attributed to the package they
      # ship in. New trees: append a "<slug>:<dir>" line below.
      - name: Generate SBOMs for all frontend trees
        run: |
          set -e
          mkdir -p ./sbom
          for entry in \
            "frontend:src/UmbracoCommunity.StaticAssets" \
            "extensions-client:src/UmbracoCommunity.Extensions/Client" \
            "block-restrictions-client:src/UmbracoCommunity.BlockRestrictions/Client" \
            "not-found-tracker-client:src/Umbraco.Community.NotFoundTracker/Client" ; do
            slug="${entry%%:*}"
            dir="${entry##*:}"
            if [ ! -f "$dir/package-lock.json" ]; then
              echo "::warning::Skipping $slug ($dir) — no package-lock.json"
              continue
            fi
            echo "::group::Installing $slug ($dir)"
            (cd "$dir" && npm ci --no-audit --no-fund)
            echo "::endgroup::"
            echo "::group::Generating SBOM for $slug"
            (cd "$dir" && cyclonedx-npm --spec-version 1.6 --output-format xml -o "$GITHUB_WORKSPACE/sbom/bom-$slug.xml")
            echo "::endgroup::"
          done

      # Upload .NET SBOM
      - name: Upload .NET SBOM to Dependency-Track
        env:
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          curl --fail-with-body -v -i -w "\nHTTP Status: %{http_code}\n" \
            -X POST "$TRACKER_ENDPOINT" \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -H "accept: application/json" \
            -H "Content-Type: multipart/form-data" \
            -F "autoCreate=true" \
            -F "projectName=${{ github.event.repository.name }}-backend" \
            -F "projectVersion=${{ github.ref_name }}" \
            -F "bom=@./sbom/bom-dotnet.xml"

      # Each ./sbom/bom-<slug>.xml lands as a separate Dependency-Track project
      # named <repo>-<slug> (e.g. Umbraco.Community.Site-not-found-tracker-client).
      - name: Upload frontend SBOMs to Dependency-Track
        env:
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          set -e
          shopt -s nullglob
          for bom in ./sbom/bom-*.xml; do
            # skip the .NET one, uploaded separately
            [ "$bom" = "./sbom/bom-dotnet.xml" ] && continue
            slug=$(basename "$bom" .xml)
            slug="${slug#bom-}"
            echo "::group::Uploading $slug"
            curl --fail-with-body -v -i -w "\nHTTP Status: %{http_code}\n" \
              -X POST "$TRACKER_ENDPOINT" \
              -H "X-Api-Key: $DTRACK_API_KEY" \
              -H "accept: application/json" \
              -H "Content-Type: multipart/form-data" \
              -F "autoCreate=true" \
              -F "projectName=${{ github.event.repository.name }}-$slug" \
              -F "projectVersion=${{ github.ref_name }}" \
              -F "bom=@$bom"
            echo "::endgroup::"
          done
